<div class="agenda">
  <div class="agenda__calendar-wrap">
    @if (monthLoading()) {
      <div class="agenda__month-loading">
        <mat-spinner diameter="24" />
      </div>
    }

    <mat-calendar
      [selected]="selectedDate()"
      (selectedChange)="onDateSelected($event)"
      [dateClass]="dateClassFn"
    />
  </div>

  <div class="agenda__day-detail">
    <app-day-agenda
      [date]="selectedDate()"
      (actionPerformed)="onActionPerformed()"
    />
  </div>
</div>
